<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tigers del Este — Orçamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#11151b;
  --surface:#181e26;
  --surface-2:#1f2630;
  --surface-3:#252d38;
  --border:#2a323e;
  --text:#e8eaf0;
  --text-muted:#8c95a6;
  --amber:#f2a93b;
  --stripe:#e8632c;
  --teal:#2dd9bd;
  --danger:#ef4565;
  --blue:#4a9eff;
  --violet:#a78bfa;
  --display:'Space Grotesk',ui-sans-serif,sans-serif;
  --body:'Inter',ui-sans-serif,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--body);}
#root{display:flex;min-height:100vh;}
.stripes{display:inline-flex;gap:3px;vertical-align:middle;margin-right:8px;}
.stripes span{width:4px;height:16px;border-radius:1px;display:inline-block;transform:skewX(-18deg);}
.stripes span:nth-child(1){background:var(--amber);}
.stripes span:nth-child(2){background:var(--stripe);}
.stripes span:nth-child(3){background:var(--amber);opacity:.55;}

/* SIDEBAR */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:20px 14px;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:8px;padding:4px 6px 18px 6px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.brand-name{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.2px;}
.brand-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text-muted);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:2px;transition:background .15s,color .15s;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--surface-3);color:var(--amber);}
.nav-item.active svg{stroke:var(--amber);}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);line-height:1.5;}
.sidebar-footer a{color:var(--teal);text-decoration:none;}

/* MAIN */
main{flex:1;padding:28px 34px;max-width:1180px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:var(--display);font-weight:700;font-size:24px;}
.page-desc{color:var(--text-muted);font-size:13px;margin-top:4px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;height:3px;width:100%;background:linear-gradient(90deg,var(--amber),var(--stripe) 40%,transparent 70%);}
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);}}

.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
.stat-value{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px;}
.stat-value.amber{color:var(--amber);}
.stat-value.teal{color:var(--teal);}

button{font-family:var(--body);font-weight:600;font-size:13px;border:none;border-radius:7px;padding:9px 14px;cursor:pointer;transition:filter .15s,opacity .15s;}
.btn-primary{background:var(--amber);color:#1a1305;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-secondary{background:var(--surface-3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:#2c3542;}
.btn-danger{background:rgba(239,69,101,.12);color:var(--danger);border:1px solid rgba(239,69,101,.3);}
.btn-danger:hover{background:rgba(239,69,101,.2);}
.btn-ghost{background:transparent;color:var(--text-muted);padding:6px 8px;}
.btn-ghost:hover{color:var(--text);}
button:disabled{opacity:.4;cursor:not-allowed;}

input,select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 10px;font-size:13px;font-family:var(--body);width:100%;}
input:focus,select:focus{outline:none;border-color:var(--amber);}
input.mono,.mono{font-family:var(--mono);}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;}
.field{margin-bottom:0;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:var(--surface-3);color:var(--text-muted);}
.tag.low{color:var(--danger);background:rgba(239,69,101,.12);}
.right{text-align:right;}
.center{text-align:center;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--surface-3);border:1px solid var(--border);border-left:3px solid var(--amber);padding:12px 16px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;max-width:320px;animation:slidein .2s ease;}
.toast.error{border-left-color:var(--danger);}
@keyframes slidein{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.empty{text-align:center;padding:46px 20px;color:var(--text-muted);}
.empty svg{width:36px;height:36px;stroke:var(--text-muted);margin-bottom:10px;}

.section-title{font-family:var(--display);font-weight:600;font-size:15px;margin:0 0 12px 0;}
.divider{height:1px;background:var(--border);margin:18px 0;}

.icon-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:4px;}
.icon-btn:hover{color:var(--text);}
.icon-btn.danger:hover{color:var(--danger);}

.totals-box{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.totals-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--text-muted);}
.totals-row.final{font-size:17px;color:var(--text);font-weight:700;border-top:1px solid var(--border);margin-top:8px;padding-top:10px;}
.totals-row .v{font-family:var(--mono);}

.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-row input{width:auto;}

.modal-bg{position:fixed;inset:0;background:rgba(8,10,14,.6);display:flex;align-items:center;justify-content:center;z-index:998;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:420px;width:90%;}

.produto-dropdown{position:fixed;z-index:1000;background:var(--surface-3);border:1px solid var(--border);border-radius:9px;max-height:260px;overflow-y:auto;box-shadow:0 14px 36px rgba(0,0,0,.5);}
.produto-dropdown .dd-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.produto-dropdown .dd-item:last-child{border-bottom:none;}
.produto-dropdown .dd-item:hover{background:var(--surface-2);}
.produto-dropdown .dd-item .dd-codigo{color:var(--amber);font-family:var(--mono);font-size:11px;display:block;margin-bottom:2px;}
.produto-dropdown .dd-empty{padding:12px;font-size:13px;color:var(--text-muted);}

.chip-list{display:flex;flex-wrap:wrap;gap:6px;max-height:140px;overflow-y:auto;padding:2px;}
.chip{padding:6px 11px;border-radius:20px;font-size:12px;background:var(--surface-3);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s,color .12s;}
.chip:hover{background:#2c3542;}
.chip.selected{background:var(--amber);color:#1a1305;border-color:var(--amber);font-weight:600;}
.opp-card{border-left:3px solid var(--teal);}
.opp-card.hot{border-left-color:var(--stripe);}
.kpi-card{border-top:3px solid var(--accent,var(--border));padding:24px 22px;}
.kpi-card .kpi-icon{color:var(--accent,var(--text-muted));margin-bottom:14px;}
.kpi-card .kpi-icon svg{width:30px;height:30px;display:block;}
.kpi-card .kpi-value{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1.1;}
.kpi-card .kpi-label{font-size:12.5px;color:var(--text-muted);margin-top:6px;}
.flash-highlight{animation:flashBorder 1.2s ease;}
@keyframes flashBorder{0%{box-shadow:0 0 0 3px var(--amber);}100%{box-shadow:0 0 0 0px transparent;}}

.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.login-box{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px 28px;position:relative;overflow:hidden;}
.login-box::before{content:"";position:absolute;top:0;left:0;height:3px;width:100%;background:linear-gradient(90deg,var(--amber),var(--stripe) 40%,transparent 70%);}
.login-error{font-size:12.5px;color:var(--danger);background:rgba(239,69,101,.1);border:1px solid rgba(239,69,101,.3);border-radius:7px;padding:8px 10px;}

.hidden{display:none !important;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px;}

@media (max-width:760px){
  #root{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;overflow-x:auto;padding:10px 12px;}
  .brand{border-bottom:none;border-right:1px solid var(--border);margin-bottom:0;padding:0 12px 0 0;margin-right:8px;}
  .sidebar-footer{display:none;}
  .nav-item{white-space:nowrap;padding:10px 14px;}
  main{padding:16px 14px;}
  .grid-4,.grid-2{grid-template-columns:1fr;}
  input,select{font-size:16px;} /* evita zoom automático ao focar no iPhone */
  .card{padding:16px;}
  table{font-size:12.5px;}
  th,td{padding:8px 6px;}
  button{padding:10px 14px;}
}
</style>
</head>
<body>
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="brand" style="border:none;padding:0;margin-bottom:22px;justify-content:center;">
      <span class="stripes"><span></span><span></span><span></span></span>
      <div>
        <div class="brand-name">Tigers del Este</div>
        <div class="brand-sub">Orçamentos &amp; Catálogo</div>
      </div>
    </div>
    <label>Usuário</label>
    <input id="login-user" autocomplete="username" placeholder="Usuário" style="margin-bottom:14px;">
    <label>Senha</label>
    <input id="login-pass" type="password" autocomplete="current-password" placeholder="Senha" style="margin-bottom:18px;">
    <div id="login-error" class="login-error hidden">Usuário ou senha incorretos.</div>
    <button class="btn-primary" id="btn-login" style="width:100%;">Entrar</button>
  </div>
</div>
<div id="root" class="hidden">
  <nav class="sidebar">
    <div class="brand">
      <span class="stripes"><span></span><span></span><span></span></span>
      <div>
        <div class="brand-name">Tigers del Este</div>
        <div class="brand-sub">Orçamentos &amp; Catálogo</div>
      </div>
    </div>
    <div id="nav"></div>
    <div class="sidebar-footer">
      Use o menu "Sincronização" para acessar de qualquer lugar.<br>
      WhatsApp: <a href="https://wa.me/595973757761" target="_blank">+595 973 757761</a><br>
      <a href="#" id="btn-logout" style="color:var(--text-muted);">Sair</a>
    </div>
  </nav>
  <main id="main"></main>
</div>
<div id="modal-root"></div>
<div id="produto-dropdown" class="produto-dropdown hidden"></div>
<div id="toast-root"></div>

<script>
/* ===================== LOGIN ===================== */
const APP_USER = 'diegodonat';
const APP_PASS = 'Tigers112233';

function isLoggedIn(){
  try{ return sessionStorage.getItem('tigers_logged_in') === '1'; }catch(e){ return false; }
}

function doLogin(){
  const user = (document.getElementById('login-user')||{}).value || '';
  const pass = (document.getElementById('login-pass')||{}).value || '';
  const errEl = document.getElementById('login-error');
  if(user.trim() === APP_USER && pass === APP_PASS){
    try{ sessionStorage.setItem('tigers_logged_in', '1'); }catch(e){}
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('root').classList.remove('hidden');
    if(typeof init === 'function') init();
  }else{
    if(errEl) errEl.classList.remove('hidden');
  }
}

function doLogout(){
  try{ sessionStorage.removeItem('tigers_logged_in'); }catch(e){}
  location.reload();
}

function initLoginScreen(){
  if(isLoggedIn()){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('root').classList.remove('hidden');
    return true;
  }
  const btnLogin = document.getElementById('btn-login');
  if(btnLogin) btnLogin.addEventListener('click', doLogin);
  const passInput = document.getElementById('login-pass');
  if(passInput) passInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doLogin(); });
  const userInput = document.getElementById('login-user');
  if(userInput) userInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doLogin(); });
  return false;
}
const __wasLoggedInAtLoad = initLoginScreen();
const __logoutLink = document.getElementById('btn-logout');
if(__logoutLink) __logoutLink.addEventListener('click', (e)=>{ e.preventDefault(); doLogout(); });

/* ===================== STORAGE ===================== */
/* Dados salvos no navegador deste dispositivo (localStorage), com sincronização
   opcional entre dispositivos via um "código de sincronização" (jsonblob.com). */
const DB = {
  async get(key, fallback){
    try{
      const v = localStorage.getItem('tigers_' + key);
      return v ? JSON.parse(v) : fallback;
    }catch(e){ return fallback; }
  },
  async set(key, value){
    try{
      localStorage.setItem('tigers_' + key, JSON.stringify(value));
      scheduleCloudSync();
      return true;
    }
    catch(e){ toast('Erro ao salvar dados neste navegador.', true); return false; }
  }
};

/* ===================== SINCRONIZAÇÃO VIA GITHUB GIST =====================
   Usa um Personal Access Token (PAT) do GitHub + um Gist privado como
   "banco de dados" simples. O token e o ID do Gist ficam salvos no
   localStorage deste navegador. Recomenda-se um token "classic" com
   APENAS a permissão "gist" marcada (não dar acesso a repositórios). */
const GIST_API = 'https://api.github.com/gists';
const GIST_FILENAME = 'tigers_backup.json';

let cloudSyncTimer = null;
let cloudSyncStatus = 'idle'; // idle | syncing | ok | error
let lastSyncDebug = [];

function getGhCreds(){
  try{
    return {
      token: localStorage.getItem('tigers_gh_token') || '',
      gistId: localStorage.getItem('tigers_gh_gist_id') || ''
    };
  }catch(e){ return {token:'', gistId:''}; }
}

function hasGhSync(){
  const c = getGhCreds();
  return !!(c.token && c.gistId);
}

function ghHeaders(token){
  return {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

async function ghCreateGist(token, data){
  const res = await fetch(GIST_API, {
    method:'POST',
    headers: ghHeaders(token),
    body: JSON.stringify({
      description: 'Tigers del Este — backup de sincronização (não editar manualmente)',
      public: false,
      files: { [GIST_FILENAME]: { content: JSON.stringify(data) } }
    })
  });
  if(!res.ok){
    const errText = await res.text().catch(()=>'');
    throw new Error(`GitHub respondeu ${res.status} ao criar o Gist: ${errText.slice(0,200)}`);
  }
  const json = await res.json();
  return json.id;
}

async function ghGetGist(token, gistId){
  const res = await fetch(`${GIST_API}/${gistId}`, { headers: ghHeaders(token) });
  if(!res.ok){
    const errText = await res.text().catch(()=>'');
    throw new Error(`GitHub respondeu ${res.status} ao ler o Gist: ${errText.slice(0,200)}`);
  }
  const json = await res.json();
  const file = json.files && json.files[GIST_FILENAME];
  if(!file) throw new Error(`Não encontrei o arquivo "${GIST_FILENAME}" dentro deste Gist.`);
  if(file.truncated && file.raw_url){
    const rawRes = await fetch(file.raw_url);
    return JSON.parse(await rawRes.text());
  }
  return JSON.parse(file.content);
}

async function ghUpdateGist(token, gistId, data){
  const res = await fetch(`${GIST_API}/${gistId}`, {
    method:'PATCH',
    headers: ghHeaders(token),
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(data) } } })
  });
  if(!res.ok){
    const errText = await res.text().catch(()=>'');
    throw new Error(`GitHub respondeu ${res.status} ao atualizar o Gist: ${errText.slice(0,200)}`);
  }
  return true;
}

function scheduleCloudSync(){
  const {token, gistId} = getGhCreds();
  if(!token || !gistId) return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(async ()=>{
    cloudSyncStatus = 'syncing';
    try{
      await ghUpdateGist(token, gistId, {produtos: state.produtos, orcamentos: state.orcamentos, presupuestosPy: state.presupuestosPy, lucroReal: state.lucroReal, vendas: state.vendas, atualizadoEm: Date.now()});
      cloudSyncStatus = 'ok';
    }catch(e){
      cloudSyncStatus = 'error';
      lastSyncDebug = [{provider:'github', error: (e && e.message) ? e.message : String(e)}];
    }
    if(state.view === 'sync') render();
  }, 1200);
}

async function createAutoGist(){
  const tokenInput = document.getElementById('gh-token-input');
  const token = tokenInput ? tokenInput.value.trim() : '';
  if(!token){ toast('Cole seu GitHub Personal Access Token primeiro.', true); return; }
  toast('Criando Gist no GitHub...');
  lastSyncDebug = [];
  try{
    const id = await ghCreateGist(token, {produtos: state.produtos, orcamentos: state.orcamentos, presupuestosPy: state.presupuestosPy, lucroReal: state.lucroReal, vendas: state.vendas, atualizadoEm: Date.now()});
    localStorage.setItem('tigers_gh_token', token);
    localStorage.setItem('tigers_gh_gist_id', id);
    cloudSyncStatus = 'ok';
    toast('Gist criado e conectado! Use o mesmo Token e Gist ID nos outros dispositivos.');
    render();
  }catch(e){
    lastSyncDebug = [{provider:'github', error: (e && e.message) ? e.message : String(e)}];
    toast('Não consegui criar o Gist. Veja os detalhes técnicos abaixo.', true);
    render();
  }
}

async function connectGithubSync(){
  const tokenInput = document.getElementById('gh-token-input');
  const gistInput = document.getElementById('gh-gistid-input');
  const token = tokenInput ? tokenInput.value.trim() : '';
  const gistId = gistInput ? gistInput.value.trim() : '';
  if(!token || !gistId){ toast('Informe o Token e o Gist ID para conectar a um Gist já existente.', true); return; }
  toast('Conectando ao GitHub...');
  lastSyncDebug = [];
  try{
    const data = await ghGetGist(token, gistId);
    state.produtos = Array.isArray(data.produtos) ? data.produtos : [];
    state.orcamentos = Array.isArray(data.orcamentos) ? data.orcamentos : [];
    state.vendas = Array.isArray(data.vendas) ? data.vendas : [];
    state.presupuestosPy = Array.isArray(data.presupuestosPy) ? data.presupuestosPy : [];
    state.lucroReal = Array.isArray(data.lucroReal) ? data.lucroReal : [];
    localStorage.setItem('tigers_gh_token', token);
    localStorage.setItem('tigers_gh_gist_id', gistId);
    localStorage.setItem('tigers_produtos', JSON.stringify(state.produtos));
    localStorage.setItem('tigers_orcamentos', JSON.stringify(state.orcamentos));
    localStorage.setItem('tigers_vendas', JSON.stringify(state.vendas));
    cloudSyncStatus = 'ok';
    toast('Conectado! Dados sincronizados via GitHub Gist.');
    state.view = 'dashboard';
    render();
  }catch(e){
    lastSyncDebug = [{provider:'github', error: (e && e.message) ? e.message : String(e)}];
    toast('Falha ao conectar. Veja os detalhes técnicos abaixo.', true);
    render();
  }
}

function disconnectSync(){
  localStorage.removeItem('tigers_gh_token');
  localStorage.removeItem('tigers_gh_gist_id');
  cloudSyncStatus = 'idle';
  toast('Sincronização desativada. Os dados continuam salvos neste navegador.');
  render();
}

function maskToken(token){
  if(!token) return '';
  if(token.length <= 10) return '•'.repeat(token.length);
  return token.slice(0,6) + '•'.repeat(8) + token.slice(-4);
}

/* ===================== STATE ===================== */
let state = {
  view: 'dashboard',
  produtos: [],
  orcamentos: [],
  presupuestosPy: [],
  lucroReal: [],
  vendas: [],
  draft: {
    cliente: '',
    cidade: '',
    taxaDolar: '',
    taxaCidade: '',
    incluirNF: false,
    nfPercent: '15',
    itens: [], // {codigo,nome,categoria,precoMinUsd,quantidade}
    comparacoes: [] // {id, solicitado, loading, resultado}
  },
  presupuestoPyDraft: null, // quando não-nulo, formulário de Presupuesto Paraguay está aberto

function recalcularValorVenda(){

}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ===================== UTIL ===================== */
function fmtUSD(n){ return (n||0).toLocaleString('en-US',{style:'currency',currency:'USD'}); }
function fmtBRL(n){ return (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function normalize(s){ return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }

function toast(msg, isError){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  root.appendChild(el);
  const duration = Math.min(8000, Math.max(3200, msg.length * 60));
  setTimeout(()=>{ el.remove(); }, duration);
}

function categoriasDerivadas(){
  const set = new Set();
  state.produtos.forEach(p => { if(p.categoria) set.add(p.categoria); });
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}

function detectCategoria(codigo, nome){
  const texto = `${codigo} ${nome}`.toUpperCase();
  for(const rule of CATEGORY_RULES){
    if(rule.test.test(texto)) return rule.categoria;
  }
  return 'Outros';
}

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV_ITEMS.map(it => `
    <div class="nav-item ${state.view===it.id?'active':''}" data-nav="${it.id}">
      ${ICONS[it.icon]}<span>${it.label}</span>

  nav.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.view = el.getAttribute('data-nav');
      if(state.view === 'orcamento') resetDraftIfNotEditing();
      render();

function resetDraftIfNotEditing(){

}

/* Excel import */
function parseExcelHeaders(row){
  const map = {};
  Object.keys(row).forEach(k=>{
    const nk = normalize(k);
    if(!map.codigo && (nk.includes('codigo') || nk.includes('cod.') || nk === 'cod' || nk.includes('sku'))) map.codigo = k;
    else if(!map.nome && (nk.includes('nome') || nk.includes('descricao') || nk.includes('descripcion') || nk.includes('producto') || nk.includes('produto') || nk.includes('item'))) map.nome = k;
    else if(!map.categoria && nk.includes('categoria')) map.categoria = k;
    else if(!map.estoque && (nk.includes('estoque') || nk.includes('stock') || nk.includes('quantidade') || nk.includes('cantidad') || nk.includes('disponivel') || nk.includes('disponible') || nk.includes('saldo') || nk.includes('qtd') || nk.includes('qty'))) map.estoque = k;
    else if(!map.precoMinUsd && (nk.includes('preco') || nk.includes('preço') || nk.includes('precio'))) map.precoMinUsd = k;
  });
  return map;
}

function handleExcelImport(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ toast('A planilha está vazia.', true); return; }
      const map = parseExcelHeaders(rows[0]);
      if(!map.codigo || !map.nome || !map.precoMinUsd){
        toast('Não encontrei as colunas obrigatórias (Código, Nome, Preço mínimo). Verifique o cabeçalho da planilha.', true);
        return;
      }
      commitImport(rows, map);
    }catch(err){
      toast('Não consegui ler essa planilha. Verifique o formato do arquivo.', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

function commitImport(rows, map){
  const seenCodigos = new Set();
  let added = 0, updated = 0, skipped = 0;

  rows.forEach(row=>{
    const codigo = String(row[map.codigo]||'').trim();
    const nome = String(row[map.nome]||'').trim();
    const precoMinUsd = Number(row[map.precoMinUsd])||0;
    if(!codigo || !nome || precoMinUsd <= 0){ skipped++; return; }
    seenCodigos.add(codigo);
    const categoriaPlanilha = map.categoria ? String(row[map.categoria]||'').trim() : '';
    const estoque = map.estoque ? Number(row[map.estoque])||0 : 0;
    const existing = state.produtos.find(p=>p.codigo===codigo);
    if(existing){
      existing.nome = nome || existing.nome;
      existing.estoque = estoque;
      existing.precoMinUsd = precoMinUsd;
      if(categoriaPlanilha){
        existing.categoria = categoriaPlanilha;
      }else if(!existing.categoria || existing.categoria === 'Outros' || existing.categoria === 'Sem categoria'){
        existing.categoria = detectCategoria(codigo, nome);
      }
      updated++;
    }else{
      state.produtos.push({codigo, nome, categoria: categoriaPlanilha || detectCategoria(codigo, nome), estoque, precoMinUsd});
      added++;
    }
  });

  // Produtos que já existiam mas não apareceram nesta planilha: mantidos no catálogo, com estoque zerado.
  let zerados = 0;
  state.produtos.forEach(p=>{
    if(!seenCodigos.has(p.codigo) && p.estoque > 0){
      p.estoque = 0;
      zerados++;
    }
  });

  DB.set('produtos', state.produtos);
  let msg = `Importação concluída: ${added} produto(s) novo(s), ${updated} atualizado(s).`;
  if(zerados) msg += ` ${zerados} produto(s) não apareceram nesta planilha e ficaram com estoque zerado (mantidos no catálogo).`;
  if(skipped) msg += ` ${skipped} linha(s) ignorada(s) por falta de código/nome/preço.`;
  if(!map.estoque) msg += ` Atenção: não encontrei uma coluna de estoque nesta planilha.`;
  toast(msg);
  render();
}

/* ===================== ORÇAMENTO (builder) ===================== */
function calcLine(item){
  const precoFinal = Number(item.precoMinUsd)||0;
  const subtotalUsd = precoFinal * (Number(item.quantidade)||0);
  return {precoFinal, subtotalUsd};
}

function calcTotais(draft){
  const totalUsd = draft.itens.reduce((s,it)=> s + calcLine(it).subtotalUsd, 0);
  const taxaDolar = Number(draft.taxaDolar)||0;
  const totalBrl = totalUsd * taxaDolar;
  const taxaCidadePercent = Number(draft.taxaCidade)||0;
  const valorTaxaCidade = totalBrl * (taxaCidadePercent/100);
  const totalBrlFinal = totalBrl + valorTaxaCidade;
  const nfPercent = Number(draft.nfPercent)||0;
  const totalFinal = draft.incluirNF ? totalBrlFinal * (1 + nfPercent/100) : totalBrlFinal;
  return {totalUsd, totalBrl, taxaCidadePercent, valorTaxaCidade, totalBrlFinal, nfPercent, totalFinal};
}

/* ===================== COMPARADOR DE PRODUTOS (IA) ===================== */
function repararJSON(raw){
  try{
    // tenta direto primeiro
    JSON.parse(raw);
    return raw;
  }catch(e){}
  let s = raw;
  // Remove vírgulas antes de } ou ]
  s = s.replace(/,\s*([}\]])/g, '$1');
  // Substitui aspas simples por duplas em chaves/valores (cuidado com contrações)
  s = s.replace(/([{,]\s*)'([^']+)'\s*:/g, '$1"$2":');
  s = s.replace(/:\s*'([^']*)'/g, ':"$1"');
  // Remove caracteres de controle dentro de strings
  s = s.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (m)=> m.replace(/[\x00-\x1F\x7F]/g, ' '));
  // Tenta novamente
  try{ JSON.parse(s); return s; }catch(e){}
  // Último recurso: extrai cada campo manualmente com regex
  const produto = (raw.match(/"produto_equivalente_codigo"\s*:\s*"([^"]*)"/) || [])[1] || null;
  const motivo = (raw.match(/"motivo"\s*:\s*"([^"]+)"/) || [])[1] || '';
  const comparacoes = [];
  const compRe = /"especificacao"\s*:\s*"([^"]*)"\s*,\s*"solicitado"\s*:\s*"([^"]*)"\s*,\s*"nosso"\s*:\s*"([^"]*)"/g;
  let m;
  while((m = compRe.exec(raw)) !== null){
    comparacoes.push({especificacao:m[1], solicitado:m[2], nosso:m[3]});
  }
  return JSON.stringify({produto_equivalente_codigo: produto==='null'?null:produto, comparacao:comparacoes, motivo});
}

async function compararProduto(idx){
  const comp = state.draft.comparacoes[idx];
  if(!comp || !comp.solicitado.trim()){ toast('Digite o produto que o cliente pediu.', true); return; }

  comp.loading = true;
  comp.resultado = null;
  render();

  const categoriaGuess = detectCategoria('', comp.solicitado);
  let candidatos = state.produtos.filter(p=>p.categoria === categoriaGuess);
  if(candidatos.length < 3) candidatos = state.produtos;
  const catalogoResumo = candidatos.map(p=>`${p.codigo} | ${p.categoria} | ${p.nome} | estoque:${p.estoque} | USD ${p.precoMinUsd}`).join('\n');

  const promptSistema = 'Você é um assistente de vendas técnico de uma distribuidora de equipamentos de redes, CFTV e eletrônicos. Responda SEMPRE em JSON válido, sem texto antes ou depois, sem markdown, sem comentários.';
  const promptUsuario = `Um cliente pediu este produto: "${comp.solicitado}"

Aqui está uma lista de produtos do nosso catálogo (código | categoria | nome | estoque | preço USD):
${catalogoResumo}

Só indique um produto_equivalente_codigo se ele REALMENTE puder substituir o solicitado: especificações compatíveis (mesma categoria/função, capacidade similar) E preço próximo ou melhor (não escolha algo muito mais caro). Se nenhum produto do catálogo for um substituto razoável, retorne produto_equivalente_codigo como null — não force uma sugestão fraca.

Responda SOMENTE em JSON válido, nesse formato exato:
{
  "produto_equivalente_codigo": "CODIGO_DO_CATALOGO_ACIMA ou null",
  "comparacao": [
    {"especificacao": "nome da especificação (ex: Portas, PoE, Alcance, Resolução, Preço)", "solicitado": "valor para o produto pedido", "nosso": "valor equivalente do nosso produto, ou \\"-\\" se produto_equivalente_codigo for null"},
    {"especificacao": "...", "solicitado": "...", "nosso": "..."}
  ],
  "motivo": "se houver equivalente: 2-3 frases dizendo se o nosso é melhor, igual ou levemente inferior, e por quê vale a pena. Se NÃO houver: explique objetivamente por que nenhum produto do catálogo atende."
}
Inclua de 4 a 6 linhas em "comparacao", cobrindo as especificações mais relevantes para esse tipo de produto.`;

  try{
    // Pollinations.ai — serviço de IA gratuito, sem chave/cadastro, compatível com o formato OpenAI.
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        messages: [
          {role:'system', content: promptSistema},
          {role:'user', content: promptUsuario}
        ],
        temperature: 0.3
      })
    });
    if(!res.ok) throw new Error(`Serviço de IA respondeu ${res.status}`);
    const textoBruto = await res.text();
    let textoResposta = textoBruto;
    try{
      const data = JSON.parse(textoBruto);
      textoResposta = (data.choices && data.choices[0] && data.choices[0].message) ? data.choices[0].message.content : textoBruto;
    }catch(e){ /* resposta já é texto puro, usa direto */ }
    const limpo = textoResposta.replace(/```json|```/g,'').trim();
    const inicio = limpo.indexOf('{');
    const fim = limpo.lastIndexOf('}');
    const jsonStr = (inicio>=0 && fim>=0) ? limpo.slice(inicio, fim+1) : limpo;
    const jsonReparado = repararJSON(jsonStr);
    const parsed = JSON.parse(jsonReparado);
    const produtoEncontrado = parsed.produto_equivalente_codigo ? state.produtos.find(p=>p.codigo===parsed.produto_equivalente_codigo) : null;
    comp.resultado = {
      comparacao: Array.isArray(parsed.comparacao) ? parsed.comparacao : [],
      produtoEncontrado: produtoEncontrado || null,
      motivo: parsed.motivo || ''
    };
  }catch(e){
    comp.resultado = {erro: true, mensagemErro: 'Não consegui gerar a comparação: ' + ((e && e.message) || 'erro desconhecido')};
    toast('Não consegui gerar a comparação agora. Veja o motivo no card.', true);
  }
  comp.loading = false;
  render();
}

function addComparadoToOrcamento(idx){
  const comp = state.draft.comparacoes[idx];

  render();
}

  const sIva = Number(item.sIva)||0;

  const qtd = Number(item.quantidade)||0;

/* ===================== LUCRO REAL (margem em preço + frete + câmbio) ===================== */
function calcLucroRealLine(item, draft){
  const qtd = Number(item.quantidade)||0;
  const pv = Number(item.precoVendaUsd)||0;
  const cr = Number(item.custoRealUsd)||0;
  const fv = (Number(draft.freteVendaPercent)||0)/100;
  const fc = (Number(draft.freteCustoPercent)||0)/100;
  const tv = Number(draft.taxaDolarVenda)||0;
  const tc = Number(draft.taxaDolarCusto)||0;

  const vendaUsdComFrete = pv * (1+fv);
  const custoUsdComFrete = cr * (1+fc);
  const subtotalVendaUsd = vendaUsdComFrete * qtd;
  const subtotalCustoUsd = custoUsdComFrete * qtd;
  const vendaBRL = subtotalVendaUsd * tv;
  const custoBRL = subtotalCustoUsd * tc;
  const lucroBRL = vendaBRL - custoBRL;

  return { subtotalVendaUsd, subtotalCustoUsd, vendaBRL, custoBRL, lucroBRL };
}

function calcLucroRealTotals(draft){
  let totalVendaBRL=0, totalCustoBRL=0;
  let lucroProdutoUsd=0, lucroFreteUsd=0, totalVendaUsdComFrete=0;
  const fv = (Number(draft.freteVendaPercent)||0)/100;
  const fc = (Number(draft.freteCustoPercent)||0)/100;
  const tv = Number(draft.taxaDolarVenda)||0;
  const tc = Number(draft.taxaDolarCusto)||0;

  draft.itens.forEach(it=>{
    const qtd = Number(it.quantidade)||0;
    const pv = Number(it.precoVendaUsd)||0;
    const cr = Number(it.custoRealUsd)||0;
    const calc = calcLucroRealLine(it, draft);
    totalVendaBRL += calc.vendaBRL;
    totalCustoBRL += calc.custoBRL;
    totalVendaUsdComFrete += calc.subtotalVendaUsd;
    lucroProdutoUsd += (pv - cr) * qtd;
    lucroFreteUsd += (pv*qtd*fv) - (cr*qtd*fc);
  });

  const lucroRealTotal = totalVendaBRL - totalCustoBRL;
  const margemPercent = totalCustoBRL > 0 ? (lucroRealTotal/totalCustoBRL)*100 : null;

  // Decomposição aproximada por origem (valorizada à taxa de custo para o componente em USD,
  // e o spread cambial aplicado sobre o total vendido em USD com frete).
  const lucroProdutoBRL = lucroProdutoUsd * tc;
  const lucroFreteBRL = lucroFreteUsd * tc;
  const lucroCambioBRL = totalVendaUsdComFrete * (tv - tc);

  const nfPercent = Number(draft.nfPercent)||0;
  const valorComNF = totalVendaBRL * (1 + nfPercent/100);

  return { totalVendaBRL, totalCustoBRL, lucroRealTotal, margemPercent, lucroProdutoBRL, lucroFreteBRL, lucroCambioBRL, nfPercent, valorComNF };
}

  const totais = calcLucroRealTotals(d);

const NETWORKING_CATS = [
  'Redes — Access Point','Redes — Switch','Redes — Roteador','Redes — ONT/ONU',
  'Redes — OLT','Redes — Fibra Óptica e Acessórios','Redes — Repetidor/Extensor',
  'Redes — Adaptadores e Acessórios','Redes — Modem','Redes — Antena','Redes — Cabos e Conectores',
  'Redes — Infraestrutura e Energia'
];
const CFTV_CAT = 'CFTV — Câmeras e Gravadores';

function vendaClienteDisplay(v){
  return (v.atribuidaDiego && v.obs) ? v.obs : (v.nomeCliente || 'Sem nome');
}
function vendaClienteKey(v){
  return v.codigoCliente || normalize(vendaClienteDisplay(v));
}
function vendaMesLabel(diaCompra){
  if(!diaCompra) return 'Sem data';
  const [y,m] = diaCompra.split('-');
  if(!y || !m) return 'Sem data';
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${meses[Number(m)-1]}/${y}`;
}

function calcVendasStats(){
  const vendas = state.vendas;
  const totalUsd = vendas.reduce((s,v)=> s + (Number(v.valor)||0), 0);
  const novosIntegradores = vendas.filter(v=>v.novoIntegrador);
  const ticketMedio = vendas.length ? totalUsd / vendas.length : 0;

  const porMes = {};
  vendas.forEach(v=>{
    const key = (v.diaCompra||'').slice(0,7) || 'sem-data';
    if(!porMes[key]) porMes[key] = {label: vendaMesLabel(v.diaCompra), total:0, count:0};
    porMes[key].total += Number(v.valor)||0;
    porMes[key].count++;
  });
  const mesesOrdenados = Object.keys(porMes).filter(k=>k!=='sem-data').sort();

  let crescimentoPercent = null, mesAtualLabel = '', mesAnteriorLabel = '';
  if(mesesOrdenados.length >= 2){
    const atual = porMes[mesesOrdenados[mesesOrdenados.length-1]];
    const anterior = porMes[mesesOrdenados[mesesOrdenados.length-2]];
    mesAtualLabel = atual.label; mesAnteriorLabel = anterior.label;
    crescimentoPercent = anterior.total > 0 ? ((atual.total - anterior.total) / anterior.total) * 100 : null;
  }

  const porCategoria = {};
  vendas.forEach(v=>{
    (v.categorias||[]).forEach(cat=>{
      if(!porCategoria[cat]) porCategoria[cat] = {total:0, count:0};
      porCategoria[cat].total += Number(v.valor)||0;
      porCategoria[cat].count++;
    });
  });

  const porCliente = {};
  vendas.forEach(v=>{
    const key = vendaClienteKey(v);
    if(!porCliente[key]) porCliente[key] = {nome: vendaClienteDisplay(v), codigo: v.codigoCliente, total:0, count:0, categorias:new Set()};
    porCliente[key].total += Number(v.valor)||0;
    porCliente[key].count++;
    (v.categorias||[]).forEach(c=>porCliente[key].categorias.add(c));
    if(v.atribuidaDiego && v.obs) porCliente[key].nome = v.obs;
  });

  const clientesComRede = Object.values(porCliente).filter(c=> Array.from(c.categorias).some(cat=>NETWORKING_CATS.includes(cat)));
  const clientesComRedeECftv = clientesComRede.filter(c=> c.categorias.has(CFTV_CAT));
  const penetracaoCftv = clientesComRede.length ? (clientesComRedeECftv.length / clientesComRede.length) * 100 : null;

  const topCategoria = Object.entries(porCategoria).sort((a,b)=>b[1].total-a[1].total)[0];
  const topCliente = Object.values(porCliente).sort((a,b)=>b.total-a.total)[0];

  return {
    totalUsd, novosIntegradores, ticketMedio, porMes, mesesOrdenados,
    crescimentoPercent, mesAtualLabel, mesAnteriorLabel,
    porCategoria, porCliente, clientesComRede, clientesComRedeECftv, penetracaoCftv,
    topCategoria, topCliente
  };
}

function gerarResumoExecutivo(stats){
  if(!state.vendas.length) return 'Nenhuma venda registrada ainda — adicione vendas para gerar o resumo executivo.';
  const partes = [];
  if(stats.mesAtualLabel){
    partes.push(`Em ${stats.mesAtualLabel}, as vendas totalizaram ${fmtUSD(stats.porMes[stats.mesesOrdenados[stats.mesesOrdenados.length-1]].total)}${stats.crescimentoPercent!==null ? `, ${stats.crescimentoPercent>=0?'um crescimento':'uma queda'} de ${Math.abs(stats.crescimentoPercent).toFixed(1)}% em relação a ${stats.mesAnteriorLabel}` : ''}.`);
  }else{
    partes.push(`O total vendido no período registrado é ${fmtUSD(stats.totalUsd)}.`);
  }
  if(stats.novosIntegradores.length) partes.push(`Foram captados ${stats.novosIntegradores.length} novo(s) integrador(es) (lead convertido em cliente) no período.`);
  if(stats.topCategoria) partes.push(`A categoria mais vendida foi "${stats.topCategoria[0]}" (${fmtUSD(stats.topCategoria[1].total)}).`);
  if(stats.topCliente) partes.push(`O maior cliente do período foi ${stats.topCliente.nome}, com ${fmtUSD(stats.topCliente.total)} em compras.`);
  if(stats.penetracaoCftv !== null) partes.push(`Da base de integradores que compram equipamento de rede, ${stats.penetracaoCftv.toFixed(0)}% já adquiriu também produtos CFTV Hikvision — ${stats.penetracaoCftv < 50 ? 'ainda há uma grande oportunidade de cross-sell' : 'a penetração da linha CFTV já é relevante'} nessa base.`);
  return partes.join(' ');
}

function gerarSugestoes(porCliente){
  const lista = Object.values(porCliente).map(c=>{
    const cats = Array.from(c.categorias);
    const temRede = cats.some(cat=>NETWORKING_CATS.includes(cat));
    const temCFTV = cats.includes(CFTV_CAT);
    let sugestao = null, prioridade = 0;
    if(temRede && !temCFTV){
      sugestao = 'Já compra equipamentos de rede (AP/Switch/Roteador) mas ainda não comprou CFTV — ótimo alvo para oferecer a nova linha Hikvision.';
      prioridade = 3;
    }else if(temCFTV && !temRede){
      sugestao = 'Já compra CFTV mas ainda não equipamentos de rede — oferecer AP/Switch Huawei eKit ou TP-Link Omada.';
      prioridade = 2;
    }else if(!cats.length){
      sugestao = 'Nenhuma categoria registrada nas vendas deste cliente ainda — preencha as categorias para gerar sugestões.';
      prioridade = 0;
    }else if(temRede && temCFTV){
      sugestao = 'Já compra rede e CFTV — cliente maduro; bom candidato para programa de parceria/fidelidade.';
      prioridade = 1;
    }
    return {...c, categorias: cats, sugestao, prioridade};
  });
  return lista.sort((a,b)=> b.prioridade - a.prioridade || b.total - a.total);
}

/* ----- Excel import de vendas (aditivo, upsert por Nota Fiscal) ----- */
function parseVendaExcelHeaders(row){
  const map = {};
  Object.keys(row).forEach(k=>{
    const nk = normalize(k);
    if(!map.notaFiscal && (nk.includes('nota fiscal') || nk.includes('nota') || nk.includes('nf'))) map.notaFiscal = k;
    else if(!map.codigoCliente && (nk.includes('codigo') || nk.includes('cod cliente'))) map.codigoCliente = k;
    else if(!map.nomeCliente && (nk.includes('nome cliente') || nk.includes('cliente') || nk.includes('nome'))) map.nomeCliente = k;
    else if(!map.diaCompra && (nk.includes('dia da compra') || nk.includes('data') || nk.includes('dia'))) map.diaCompra = k;
    else if(!map.valor && nk.includes('valor')) map.valor = k;
    else if(!map.obs && (nk.includes('obs') || nk.includes('observa'))) map.obs = k;
  });
  return map;
}

function toISODate(raw){
  if(!raw) return '';
  if(raw instanceof Date) return raw.toISOString().slice(0,10);
  if(typeof raw === 'number'){
    const d = new Date(Math.round((raw - 25569) * 86400 * 1000));
    return isNaN(d.getTime()) ? '' : d.toISOString().slice(0,10);
  }
  const s = String(raw).trim();
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){
    let [,d,mo,y] = m;
    if(y.length===2) y = '20'+y;
    return `${y.padStart(4,'0')}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return s.slice(0,10);
  return '';
}

function parseMoeda(raw){
  if(typeof raw === 'number') return raw;
  if(!raw) return 0;
  let s = String(raw).replace(/[^0-9.,-]/g,'');
  if(s.includes(',') && s.includes('.')) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.includes(',')) s = s.replace(',', '.');
  return Number(s)||0;
}

function handleVendaExcelImport(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ toast('A planilha está vazia.', true); return; }
      const map = parseVendaExcelHeaders(rows[0]);
      if(!map.notaFiscal || !map.valor){
        toast('Não encontrei as colunas obrigatórias (Nota Fiscal, Valor). Verifique o cabeçalho.', true);
        return;
      }
      let added = 0, updated = 0;
      rows.forEach(row=>{
        const notaFiscal = String(row[map.notaFiscal]||'').trim();
        if(!notaFiscal) return;
        const codigoCliente = map.codigoCliente ? String(row[map.codigoCliente]||'').trim() : '';
        const nomeCliente = map.nomeCliente ? String(row[map.nomeCliente]||'').trim() : '';
        const diaCompra = map.diaCompra ? toISODate(row[map.diaCompra]) : '';
        const valor = parseMoeda(row[map.valor]);
        const obs = map.obs ? String(row[map.obs]||'').trim() : '';
        const novoIntegrador = normalize(obs).includes('novo integrador');
        const atribuidaDiego = normalize(nomeCliente).includes('diego');
        const existing = state.vendas.find(v=>v.notaFiscal===notaFiscal);
        if(existing){
          Object.assign(existing, {codigoCliente, nomeCliente, diaCompra, valor, obs, novoIntegrador, atribuidaDiego});
          updated++;
        }else{
          state.vendas.push({id:uid(), notaFiscal, codigoCliente, nomeCliente, diaCompra, valor, obs, categorias:[], produtos:[], novoIntegrador, atribuidaDiego});
          added++;
        }
      });
      DB.set('vendas', state.vendas);
      toast(`Importação concluída: ${added} venda(s) nova(s), ${updated} atualizada(s). Lembre-se de marcar as categorias de produto em cada uma.`);
      render();
    }catch(err){
      toast('Não consegui ler essa planilha. Verifique o formato do arquivo.', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

function downloadBlob(blob, filename){
  try{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 800);
  }catch(err){
    try{
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      toast('Se o arquivo abrir numa nova aba, use o botão de compartilhar/salvar do seu navegador.');
    }catch(err2){
      toast('Não consegui gerar o arquivo neste navegador.', true);
    }
  }
}

function exportXLSX(payload){
  if(!payload.itens.length){ toast('Adicione ao menos um item antes de exportar.', true); return; }
  if(typeof XLSX === 'undefined'){ toast('O gerador de Excel ainda não carregou. Verifique sua internet e tente novamente em alguns segundos.', true); return; }
  try{
  const rows = payload.itens.map(it=>({
    'Código': it.codigo,
    'Produto': it.nome,
    'Quantidade': it.quantidade,
    'Preço USD': Number(it.precoFinal.toFixed(2)),
    'Subtotal (USD)': Number(it.subtotalUsd.toFixed(2))
  }));
  rows.push({});
  rows.push({'Código':'TOTAIS'});
  rows.push({'Código':'Total USD', 'Produto': Number(payload.totalUsd.toFixed(2))});
  rows.push({'Código':'Total BRL', 'Produto': Number(payload.totalBrl.toFixed(2))});

  rows.push({'Código':'TOTAL FINAL (BRL)', 'Produto': Number(payload.totalFinal.toFixed(2))});

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Orçamento');
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

}

/* ===================== SELETOR DE PRODUTO (dropdown customizado) ===================== */
let activeDropdownContext = null; // {type:'orcamento'|'venda', idx}

function openProdutoDropdown(type, idx, inputEl){
  activeDropdownContext = {type, idx};
  positionProdutoDropdown(inputEl);
  filterProdutoDropdown(inputEl.value);
}

function positionProdutoDropdown(inputEl){
  const dd = document.getElementById('produto-dropdown');
  if(!dd || !inputEl) return;
  const rect = inputEl.getBoundingClientRect();
  const spaceBelow = window.innerHeight - rect.bottom;
  const maxHeight = Math.min(260, Math.max(120, spaceBelow - 12));
  dd.style.left = rect.left + 'px';
  dd.style.width = rect.width + 'px';
  dd.style.maxHeight = maxHeight + 'px';
  if(spaceBelow < 140 && rect.top > 140){
    dd.style.top = (rect.top - Math.min(260, rect.top - 12)) + 'px';
  }else{
    dd.style.top = (rect.bottom + 4) + 'px';
  }
}

function filterProdutoDropdown(query){
  const dd = document.getElementById('produto-dropdown');
  if(!dd) return;
  const term = normalize(query);
  const matches = state.produtos.filter(p=>
    !term || normalize(p.codigo).includes(term) || normalize(p.nome).includes(term)
  ).slice(0, 30);

  if(!matches.length){
    dd.innerHTML = `<div class="dd-empty">Nenhum produto encontrado${term ? ' para "'+escapeHtml(query)+'"' : ''}.</div>`;
  }else{
    dd.innerHTML = matches.map(p=>`
      <div class="dd-item" data-codigo="${escapeHtml(p.codigo)}">
        <span class="dd-codigo">${escapeHtml(p.codigo)} · estoque: ${p.estoque}</span>
        ${escapeHtml(p.nome)}
      </div>`).join('');
    dd.querySelectorAll('.dd-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        selectProdutoForItem(el.getAttribute('data-codigo'));
      });
    });
  }
  dd.classList.remove('hidden');
}

function selectProdutoForItem(codigo){
  const ctx = activeDropdownContext;
  if(!ctx) return;
  const p = state.produtos.find(pp=>pp.codigo===codigo);
  if(!p){ toast('Produto não encontrado no catálogo.', true); return; }
  if(ctx.type === 'orcamento'){
    state.draft.itens[ctx.idx] = {...state.draft.itens[ctx.idx], codigo:p.codigo, nome:p.nome, categoria:p.categoria, precoMinUsd:p.precoMinUsd, precoCatalogo:p.precoMinUsd};
  }else if(ctx.type === 'venda'){
    state.vendaDraft.produtos[ctx.idx] = {...state.vendaDraft.produtos[ctx.idx], codigo:p.codigo, nome:p.nome, preco:p.precoMinUsd};
    recalcularValorVenda();
  }else if(ctx.type === 'presupuesto'){
    state.presupuestoPyDraft.itens[ctx.idx] = {...state.presupuestoPyDraft.itens[ctx.idx], codigo:p.codigo, nome:p.nome, sIva:p.precoMinUsd};
  }else if(ctx.type === 'lucroreal'){
    const it = state.lucroRealDraft.itens.find(x=>x.uid===ctx.idx);
    if(it) Object.assign(it, {codigo:p.codigo, nome:p.nome, manual:false, precoVendaUsd:p.precoMinUsd, custoRealUsd:p.precoMinUsd});
  }
  closeProdutoDropdown();
  render();
}

function closeProdutoDropdown(){
  activeDropdownContext = null;
  const dd = document.getElementById('produto-dropdown');
  if(dd) dd.classList.add('hidden');
}

// Fecha o dropdown ao clicar fora ou rolar a página — registrado uma única vez.

    state.produtoSearch = e.target.value;
    clearTimeout(window.__searchDebounce);
    window.__searchDebounce = setTimeout(()=>{
      render();
      const again = document.getElementById('produto-search');
      if(again){ again.focus(); const p = state.produtoSearch.length; try{ again.setSelectionRange(p,p); }catch(_){} }
    }, 180);
  });
  const pc = document.getElementById('produto-categoria-filtro');
  if(pc) pc.addEventListener('change', (e)=>{ state.produtoCategoriaFiltro = e.target.value; render(); });
  const reclassBtn = document.getElementById('btn-reclassificar');
  if(reclassBtn) reclassBtn.addEventListener('click', ()=>{
    let count = 0;
    state.produtos.forEach(p=>{
      if(!p.categoria || p.categoria === 'Outros' || p.categoria === 'Sem categoria'){
        p.categoria = detectCategoria(p.codigo, p.nome);
        count++;
      }
    });
    DB.set('produtos', state.produtos);
    toast(count ? `${count} produto(s) reclassificado(s).` : 'Nenhum produto pendente de classificação.');
    render();
  });
  document.querySelectorAll('.produto-categoria-input').forEach(el=>{
    el.addEventListener('change', (e)=>{
      const codigo = e.target.getAttribute('data-codigo');
      const p = state.produtos.find(pp=>pp.codigo===codigo);
      if(p){
        p.categoria = e.target.value.trim() || 'Outros';
        DB.set('produtos', state.produtos);
      }
      render();
    });
  });

  // Orçamento header fields — texto simples (sem recálculo, sem re-render)
  bindTextField('f-cliente','cliente');
  bindTextField('f-cidade','cidade');
  // Campos numéricos que afetam os totais — atualização parcial (sem reconstruir a página)
  bindCalcField('f-taxa-dolar','taxaDolar');
  bindCalcField('f-taxa-cidade','taxaCidade');
  const nf = document.getElementById('f-nf');

    state.draft.incluirNF = e.target.checked;
    const pctInput = document.getElementById('f-nf-percent');

  bindCalcField('f-nf-percent','nfPercent');

  // Add item

  if(addBtn) addBtn.addEventListener('click', ()=>{
    state.draft.itens.push({codigo:'',nome:'',categoria:'',precoMinUsd:0,quantidade:1});
    render();
  });

  // Item rows
  document.querySelectorAll('.item-produto-input').forEach(el=>{
    const idx = Number(el.getAttribute('data-idx'));
    el.addEventListener('focus', (e)=> openProdutoDropdown('orcamento', idx, e.target));
    el.addEventListener('input', (e)=>{
      if(!(activeDropdownContext && activeDropdownContext.type==='orcamento' && activeDropdownContext.idx===idx)) openProdutoDropdown('orcamento', idx, e.target);
      else { positionProdutoDropdown(e.target); filterProdutoDropdown(e.target.value); }
    });
  });
  document.querySelectorAll('.item-qtd').forEach(el=>{
    el.addEventListener('input', (e)=>{
      const idx = Number(e.target.getAttribute('data-idx'));
      state.draft.itens[idx].quantidade = Number(e.target.value)||0;
      refreshTotaisELinhas();
    });
  });
  document.querySelectorAll('.item-preco').forEach(el=>{
    el.addEventListener('input', (e)=>{
      const idx = Number(e.target.getAttribute('data-idx'));
      state.draft.itens[idx].precoMinUsd = Number(e.target.value)||0;
      refreshTotaisELinhas();
    });
  });
  document.querySelectorAll('.item-remove').forEach(el=>{

function salvarOrcamento(){
  if(!state.draft.itens.length){ toast('Adicione ao menos um item antes de salvar.', true); return; }
  if(!state.draft.taxaDolar){ toast('Informe a taxa do dólar.', true); return; }
  const payload = buildOrcamentoPayload(state.draft);
  if(state.editingOrcamentoId){
    const idx = state.orcamentos.findIndex(o=>o.id===state.editingOrcamentoId);
    if(idx>-1) state.orcamentos[idx] = {...payload, criadoEm: state.orcamentos[idx].criadoEm};
  }else{
    state.orcamentos.push(payload);
  }
  DB.set('orcamentos', state.orcamentos);
  state.editingOrcamentoId = null;
  state.draft = {cliente:'',cidade:'',taxaDolar:'',taxaCidade:'',incluirNF:false,nfPercent:'15',itens:[],comparacoes:[]};
  toast('Orçamento salvo com sucesso.');
  state.view = 'historico';
  render();
}

/* ===================== INIT ===================== */
async function init(){
  const {token, gistId} = getGhCreds();
  if(token && gistId){
    try{
      const data = await ghGetGist(token, gistId);
      if(data){
        state.produtos = Array.isArray(data.produtos) ? data.produtos : [];
        state.orcamentos = Array.isArray(data.orcamentos) ? data.orcamentos : [];
        state.vendas = Array.isArray(data.vendas) ? data.vendas : [];
    state.presupuestosPy = Array.isArray(data.presupuestosPy) ? data.presupuestosPy : [];
    state.lucroReal = Array.isArray(data.lucroReal) ? data.lucroReal : [];
        localStorage.setItem('tigers_produtos', JSON.stringify(state.produtos));
        localStorage.setItem('tigers_orcamentos', JSON.stringify(state.orcamentos));
        localStorage.setItem('tigers_vendas', JSON.stringify(state.vendas));
        cloudSyncStatus = 'ok';
        render();
        return;
      }
    }catch(e){
      lastSyncDebug = [{provider:'github', error: (e && e.message) ? e.message : String(e)}];
      /* sem internet ou Gist indisponível — usa a cópia local */
    }
  }
  state.produtos = await DB.get('produtos', []);
  state.orcamentos = await DB.get('orcamentos', []);
  state.vendas = await DB.get('vendas', []);
  state.presupuestosPy = await DB.get('presupuestosPy', []);
  state.lucroReal = await DB.get('lucroReal', []);
  render();
}
if(__wasLoggedInAtLoad) init();
</script>
</body>
</html>
